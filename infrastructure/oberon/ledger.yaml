---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ledger
  namespace: sovereign-ai-lab
  labels:
    app: ledger
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ledger
  template:
    metadata:
      labels:
        app: ledger
    spec:
      containers:
        - name: ledger
          image: quay.io/redhat-gpte/sovereign-ledger:latest
          ports:
            - containerPort: 9092
              name: grpc
            - containerPort: 8080
              name: health
            - containerPort: 8083
              name: metrics
          env:
            - name: ARE_LEDGER_DB_CONNECTION_STRING
              value: "host=postgres port=5432 user=ledger_app password=ledger_app dbname=ledger sslmode=disable"
            - name: ARE_LEDGER_GRPC_PORT
              value: "9092"
            - name: ARE_LEDGER_HEALTH_PORT
              value: "8080"
            - name: ARE_LEDGER_METRICS_PORT
              value: "8083"
            - name: ARE_LEDGER_KAFKA_BOOTSTRAP_SERVERS
              value: "unused"
            - name: ARE_LEDGER_KAFKA_SASL_USERNAME
              value: "unused"
            - name: ARE_LEDGER_KAFKA_SASL_PASSWORD
              value: "unused"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: ledger
  namespace: sovereign-ai-lab
spec:
  selector:
    app: ledger
  ports:
    - port: 9092
      targetPort: 9092
      name: grpc
    - port: 8080
      targetPort: 8080
      name: health
