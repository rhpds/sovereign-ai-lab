---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: opa
  namespace: sovereign-ai-lab
  labels:
    app: opa
spec:
  replicas: 1
  selector:
    matchLabels:
      app: opa
  template:
    metadata:
      labels:
        app: opa
    spec:
      containers:
        - name: opa
          image: openpolicyagent/opa:latest
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          args:
            - run
            - --server
            - --addr
            - ":8181"
            - /policies/..data/
          ports:
            - containerPort: 8181
          volumeMounts:
            - name: policies
              mountPath: /policies
          readinessProbe:
            httpGet:
              path: /health
              port: 8181
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
      volumes:
        - name: policies
          configMap:
            name: opa-policies
---
apiVersion: v1
kind: Service
metadata:
  name: opa
  namespace: sovereign-ai-lab
spec:
  selector:
    app: opa
  ports:
    - port: 8181
      targetPort: 8181
