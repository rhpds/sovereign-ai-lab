# Praxis proxy configuration for Sovereign AI Lab
# Routes inference traffic through semantic router, MCP through ContextForge

listeners:
  - name: sovereign-gateway
    address: "0.0.0.0:9000"
    filter_chains:
      - sovereign-pipeline

filter_chains:
  - name: sovereign-pipeline
    filters:
      - filter: router
        routes:
          - path_prefix: /v1/
            cluster: semantic-router
          - path_prefix: /v3/
            cluster: semantic-router
          - path_prefix: /mcp/
            cluster: contextforge
          - path_prefix: /a2a/
            cluster: contextforge
      - filter: load_balancer
        clusters:
          - name: semantic-router
            endpoints:
              - address: semantic-router:8001
            read_timeout_ms: 120000
          - name: contextforge
            endpoints:
              - address: contextforge:4444
            read_timeout_ms: 30000

admin:
  address: "127.0.0.1:9901"
