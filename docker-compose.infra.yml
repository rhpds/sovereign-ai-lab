services:
  # ─── Ledger foundation ──────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ledger
      POSTGRES_PASSWORD: ledger
      POSTGRES_DB: ledger
    volumes:
      - ./ledger/are-immutable-ledger/migrations/001_init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./ledger/are-immutable-ledger/migrations/002_correlation_id_text.sql:/docker-entrypoint-initdb.d/02-correlation-id.sql
      - ./ledger/are-immutable-ledger/demo/postgres-init/03-permissions.sql:/docker-entrypoint-initdb.d/03-permissions.sql
      - ./ledger/are-immutable-ledger/migrations/003_hash_index.sql:/docker-entrypoint-initdb.d/04-hash-index.sql
      - ./ledger/are-immutable-ledger/migrations/004_input_hash.sql:/docker-entrypoint-initdb.d/05-input-hash.sql
      - ./ledger/are-immutable-ledger/migrations/005_writer_signature.sql:/docker-entrypoint-initdb.d/06-writer-signature.sql
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ledger"]
      interval: 2s
      timeout: 5s
      retries: 10

  ledger:
    build:
      context: ./ledger/are-immutable-ledger
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ARE_LEDGER_DB_CONNECTION_STRING: "host=postgres port=5432 user=ledger_app password=ledger_app dbname=ledger sslmode=disable"
      ARE_LEDGER_GRPC_PORT: "9092"
      ARE_LEDGER_HEALTH_PORT: "8080"
      ARE_LEDGER_METRICS_PORT: "8083"
      ARE_LEDGER_KAFKA_BOOTSTRAP_SERVERS: "unused"
      ARE_LEDGER_KAFKA_SASL_USERNAME: "unused"
      ARE_LEDGER_KAFKA_SASL_PASSWORD: "unused"
    ports:
      - "28080:8080"
      - "29092:9092"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/readyz || exit 1"]
      interval: 3s
      timeout: 5s
      retries: 10

  ledger-gateway:
    build:
      context: ./ledger
      dockerfile: gateway.Dockerfile
    depends_on:
      ledger:
        condition: service_healthy
    environment:
      LEDGER_ENDPOINT: "ledger:9092"
      GATEWAY_PORT: "28099"
      GATEWAY_HOST: "0.0.0.0"
      GATEWAY_CORS_ORIGINS: "http://localhost:9001,http://localhost:9099,http://localhost:5173"
    ports:
      - "28099:28099"

  # ─── Policy engine ─────────────────────────────────────────────────────────

  opa:
    image: openpolicyagent/opa:latest
    ports: ["8181:8181"]
    command: >
      run --server --addr :8181
      --config-file /config/config.yaml
      /policies
    volumes:
      - ./infra/opa/policies:/policies:ro
      - ./infra/opa/config.yaml:/config/config.yaml:ro
    depends_on:
      ledger:
        condition: service_healthy

  # ─── Inference ──────────────────────────────────────────────────────────────

  vllm:
    image: vllm/vllm-openai:latest
    ports: ["8000:8000"]
    volumes:
      - ./inference/models:/models:ro
      - ./inference/vllm/config.yaml:/config.yaml:ro
    command: ["--config", "/config.yaml"]
    depends_on:
      ledger:
        condition: service_healthy

  semantic-router:
    build:
      context: ./inference/semantic-router
      dockerfile: Dockerfile
    ports: ["8001:8001"]
    volumes:
      - ./inference/semantic-router/policy.yaml:/config/policy.yaml:ro
    environment:
      SR_CONFIG: /config/policy.yaml
    depends_on:
      ledger:
        condition: service_healthy
      vllm:
        condition: service_started

volumes:
  pgdata:
